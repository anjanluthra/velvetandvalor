<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C1E3A"/>
      <stop offset="100%" stop-color="#091729"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A9090"/>
      <stop offset="100%" stop-color="#126565"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- Phone outline -->
  <rect x="310" y="100" width="180" height="360" rx="24" ry="24"
        fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
  <!-- Phone screen area -->
  <rect x="320" y="115" width="160" height="330" rx="16" ry="16"
        fill="#FFFFFF" opacity="0.03"/>
  <!-- Phone notch -->
  <rect x="370" y="105" width="60" height="6" rx="3" fill="#FFFFFF" opacity="0.1"/>

  <!-- Shield overlay centered on phone -->
  <g transform="translate(400, 270)" filter="url(#glow)">
    <path d="M0,-80 L55,-60 L55,15 C55,55 30,80 0,95 C-30,80 -55,55 -55,15 L-55,-60 Z"
          fill="url(#shieldGrad)" opacity="0.85"/>
    <path d="M0,-80 L55,-60 L55,15 C55,55 30,80 0,95 C-30,80 -55,55 -55,15 L-55,-60 Z"
          fill="none" stroke="#1A9090" stroke-width="1.5" opacity="1"/>
    <!-- Checkmark inside shield -->
    <polyline points="-18,8 -5,22 22,-12" fill="none" stroke="#FFFFFF" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Raised edge indicator lines - left side -->
  <g opacity="0.5">
    <line x1="290" y1="160" x2="305" y2="160" stroke="#1A9090" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="290" y1="160" x2="290" y2="200" stroke="#1A9090" stroke-width="1.5"/>
    <line x1="290" y1="200" x2="305" y2="200" stroke="#1A9090" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Arrow tip -->
    <polygon points="290,155 287,162 293,162" fill="#1A9090"/>
    <polygon points="290,205 287,198 293,198" fill="#1A9090"/>
  </g>

  <!-- Raised edge indicator lines - right side -->
  <g opacity="0.5">
    <line x1="510" y1="160" x2="495" y2="160" stroke="#1A9090" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="510" y1="160" x2="510" y2="200" stroke="#1A9090" stroke-width="1.5"/>
    <line x1="510" y1="200" x2="495" y2="200" stroke="#1A9090" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="510,155 507,162 513,162" fill="#1A9090"/>
    <polygon points="510,205 507,198 513,198" fill="#1A9090"/>
  </g>

  <!-- Raised edge label -->
  <text x="525" y="183" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="11"
        opacity="0.35" letter-spacing="1.5" text-transform="uppercase">RAISED EDGE</text>

  <!-- Bottom accent line -->
  <line x1="300" y1="520" x2="500" y2="520" stroke="#1A9090" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="520" r="2" fill="#1A9090" opacity="0.5"/>
</svg>