<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C1E3A"/>
      <stop offset="100%" stop-color="#091729"/>
    </linearGradient>
    <!-- Glossy swatch gradient -->
    <linearGradient id="glossyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A9090"/>
      <stop offset="40%" stop-color="#1A9090"/>
      <stop offset="50%" stop-color="#2ED0D0"/>
      <stop offset="60%" stop-color="#1A9090"/>
      <stop offset="100%" stop-color="#126565"/>
    </linearGradient>
    <!-- Matte swatch gradient -->
    <linearGradient id="matteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A9090"/>
      <stop offset="100%" stop-color="#147070"/>
    </linearGradient>
    <!-- Glossy reflection highlight -->
    <linearGradient id="glossySheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Matte noise texture -->
    <filter id="matteNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad3)"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.03" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="0" x2="800" y2="600"/>
    <line x1="100" y1="0" x2="800" y2="500"/>
    <line x1="200" y1="0" x2="800" y2="400"/>
    <line x1="0" y1="100" x2="700" y2="600"/>
    <line x1="0" y1="200" x2="600" y2="600"/>
  </g>

  <!-- GLOSSY SWATCH (left) -->
  <g transform="translate(260, 170)" filter="url(#softShadow)">
    <rect width="160" height="260" rx="16" fill="url(#glossyGrad)"/>
    <!-- Glossy reflection streak -->
    <rect width="160" height="260" rx="16" fill="url(#glossySheen)"/>
    <!-- Specular highlight -->
    <ellipse cx="65" cy="70" rx="40" ry="60" fill="#FFFFFF" opacity="0.08"
             transform="rotate(-25, 65, 70)"/>
    <!-- Reflection line -->
    <line x1="40" y1="30" x2="120" y2="230" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>
  </g>
  <!-- Glossy label -->
  <text x="340" y="470" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="13"
        text-anchor="middle" opacity="0.5" letter-spacing="2">GLOSSY</text>

  <!-- MATTE SWATCH (right) -->
  <g transform="translate(460, 170)" filter="url(#softShadow)">
    <rect width="160" height="260" rx="16" fill="url(#matteGrad)" filter="url(#matteNoise)"/>
    <!-- Matte soft texture dots -->
    <g fill="#FFFFFF" opacity="0.03">
      <circle cx="30" cy="40" r="15"/>
      <circle cx="80" cy="80" r="20"/>
      <circle cx="120" cy="50" r="12"/>
      <circle cx="50" cy="130" r="18"/>
      <circle cx="110" cy="160" r="14"/>
      <circle cx="70" cy="210" r="16"/>
      <circle cx="130" cy="230" r="10"/>
    </g>
    <!-- Subtle even surface indicator -->
    <rect x="20" y="40" width="120" height="180" rx="8" fill="none"
          stroke="#FFFFFF" stroke-width="0.5" opacity="0.06"/>
  </g>
  <!-- Matte label -->
  <text x="540" y="470" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="13"
        text-anchor="middle" opacity="0.5" letter-spacing="2">MATTE</text>

  <!-- Divider between swatches -->
  <line x1="440" y1="200" x2="440" y2="400" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>

  <!-- VS or comparison indicator -->
  <circle cx="440" cy="300" r="16" fill="#0C1E3A" stroke="#1A9090" stroke-width="1" opacity="0.6"/>
  <text x="440" y="305" fill="#1A9090" font-family="system-ui, sans-serif" font-size="10"
        text-anchor="middle" opacity="0.7" letter-spacing="1">VS</text>

  <!-- Bottom accent -->
  <line x1="300" y1="530" x2="500" y2="530" stroke="#1A9090" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="530" r="2" fill="#1A9090" opacity="0.5"/>
</svg>